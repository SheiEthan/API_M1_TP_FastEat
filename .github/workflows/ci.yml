name: CI/CD Pipeline

on:
  push:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    services:
      mariadb:
        image: mariadb:latest
        env:
          MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
          MARIADB_DATABASE: orm
        options: >-
          --health-cmd="mariadb-admin ping -h localhost -uroot -p$$MARIADB_ROOT_PASSWORD --silent"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=10
        ports:
          - 3306:3306

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Wait for MariaDB
        run: |
          until mysql -h 127.0.0.1 -u root -p${{ secrets.MARIADB_ROOT_PASSWORD }} -e "SELECT 1;" > /dev/null 2>&1; do
            echo "Waiting..."
            sleep 2
          done

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: mariadb://root:${{ secrets.MARIADB_ROOT_PASSWORD }}@127.0.0.1:3306/orm

      - name: Apply migrations
        run: npx prisma db push
        env:
          DATABASE_URL: mariadb://root:${{ secrets.MARIADB_ROOT_PASSWORD }}@127.0.0.1:3306/orm

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: mariadb://root:${{ secrets.MARIADB_ROOT_PASSWORD }}@127.0.0.1:3306/orm

      - name: Login to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name (lowercase)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: echo "IMAGE=${{ env.REGISTRY }}/$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
